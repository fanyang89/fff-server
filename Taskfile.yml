version: "3"

vars:
  TARGET: x86_64-unknown-linux-musl
  BIN: target/{{.TARGET}}/release/plocate-server

tasks:
  default:
    desc: Build the static musl release binary
    cmds:
      - task: build

  check:
    desc: Type-check without producing a binary
    cmds:
      - cargo check

  web-install:
    desc: Install frontend dependencies
    sources:
      - web/package.json
      - web/pnpm-lock.yaml
    generates:
      - web/node_modules/.package-lock.json
    cmds:
      - pnpm install --dir web

  web-build:
    desc: Build the frontend into web/dist (embedded by rust-embed at release)
    deps: [web-install]
    sources:
      - web/src/**/*
      - web/index.html
      - web/package.json
      - web/vite.config.ts
      - web/components.json
    generates:
      - web/dist/**/*
    cmds:
      - pnpm --dir web build

  web-dev:
    desc: Vite dev server (proxies /api, /swagger-ui, /openapi.json to :8787)
    cmds:
      - pnpm --dir web dev

  build:
    desc: Build a fully-static x86_64 musl binary with cargo-zigbuild
    deps: [web-build]
    sources:
      - src/**/*.rs
      - Cargo.toml
      - Cargo.lock
      - web/dist/**/*
    generates:
      - "{{.BIN}}"
    cmds:
      - cargo zigbuild --release --target {{.TARGET}}
      - strip "{{.BIN}}" || true

  run:
    desc: Run with the host toolchain (gnu) for local dev
    cmds:
      - cargo run -- {{.CLI_ARGS}}

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean

  plocate:
    desc: Build static musl plocate + updatedb (vendored zstd + jemalloc-static)
    preconditions:
      - sh: command -v zig >/dev/null
        msg: "zig not installed"
      - sh: test -f third_party/plocate-1.1.24.tar.gz
        msg: "missing third_party/plocate-1.1.24.tar.gz"
      - sh: test -f third_party/zstd-1.5.6.tar.gz
        msg: "missing third_party/zstd-1.5.6.tar.gz"
      - sh: test -f third_party/jemalloc-5.3.0.tar.bz2
        msg: "missing third_party/jemalloc-5.3.0.tar.bz2"
    sources:
      - third_party/plocate-1.1.24.tar.gz
      - third_party/zstd-1.5.6.tar.gz
      - third_party/jemalloc-5.3.0.tar.bz2
      - scripts/build-plocate-musl.sh
    generates:
      - dist/musl/plocate
      - dist/musl/updatedb
    cmds:
      - bash scripts/build-plocate-musl.sh
      - task: plocate-inspect

  plocate-inspect:
    desc: Verify the musl plocate/updatedb binaries are static and runnable
    preconditions:
      - sh: test -f dist/musl/plocate
        msg: "binaries missing; run: task plocate first"
    cmds:
      - file dist/musl/plocate dist/musl/updatedb
      - du -h dist/musl/plocate dist/musl/updatedb
      - sh -c "ldd dist/musl/plocate 2>&1 || true"
      - dist/musl/plocate --version

  rpm:
    desc: Build the RPM via nFPM (depends on build + plocate)
    preconditions:
      - sh: command -v nfpm >/dev/null
        msg: "nfpm not installed (go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest)"
    deps: [build, plocate]
    sources:
      - packaging/**/*
      - target/x86_64-unknown-linux-musl/release/plocate-server
      - dist/musl/plocate
      - dist/musl/updatedb
    generates:
      - "dist/plocate-server-*.rpm"
    cmds:
      - mkdir -p dist
      - nfpm package --config packaging/nfpm.yaml --packager rpm --target dist/

  pacman:
    desc: Build the Arch pacman package via nFPM (depends on build + plocate)
    preconditions:
      - sh: command -v nfpm >/dev/null
        msg: "nfpm not installed (go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest)"
    deps: [build, plocate]
    sources:
      - packaging/**/*
      - target/x86_64-unknown-linux-musl/release/plocate-server
      - dist/musl/plocate
      - dist/musl/updatedb
    generates:
      - "dist/plocate-server-*.pkg.tar.*"
    cmds:
      - mkdir -p dist
      - nfpm package --config packaging/nfpm.yaml --packager archlinux --target dist/

  packages:
    desc: Build both RPM and pacman packages
    cmds:
      - task: rpm
      - task: pacman

  inspect:
    desc: Report whether the built binary is statically linked and its size
    preconditions:
      - sh: test -f "{{.BIN}}"
        msg: "binary missing; run: task build first"
    cmds:
      - file "{{.BIN}}"
      - du -h "{{.BIN}}"
      - sh -c "ldd '{{.BIN}}' 2>&1 || true"

  # --------------------------------------------------------------------
  # Load testing harness (bench/ workspace member). Build the dataset
  # once, start the server against it, then drive load with `bench-baseline`
  # (constant RPS) or `bench-saturate` (constant concurrency).
  # --------------------------------------------------------------------

  bench-data:
    desc: "Generate a synthetic artifact-tree index (size: 10k|100k|1m)"
    sources:
      - bench/data/generate.sh
    generates:
      - bench/data/tree/**/*
      - bench/data/files.db
      - bench/data/queries.txt
    cmds:
      - bash bench/data/generate.sh {{.CLI_ARGS}}

  bench-serve:
    desc: Run server against the bench index (foreground; needs bench-data)
    preconditions:
      - sh: test -f bench/data/files.db
        msg: "index missing; run: task bench-data -- 10k|100k|1m first"
    cmds:
      - cargo run --release -- {{.BENCH_SERVER_ARGS}}

  bench-serve-hdd:
    desc: |
      Run server with LD_PRELOAD stat-latency injection (simulates HDD).
      Env:
        SLOWIO_STAT_US  microseconds per stat (default 10000 ~ HDD seek)
        SLOWIO_DEBUG=1  print every intercepted stat
        BENCH_BIND      bind address (default 127.0.0.1:8787)
      Args after -- are appended to the server args (e.g. --max-concurrent-searches 4).
      Example: SLOWIO_STAT_US=5000 task bench-serve-hdd -- --max-concurrent-searches 4
    preconditions:
      - sh: test -f bench/data/files.db
        msg: "index missing; run: task bench-data -- 10k|100k|1m first"
      - sh: command -v gcc >/dev/null
        msg: "gcc not installed (needed to build slowio.so)"
    deps:
      - bench-build-slowio
    vars:
      STAT_US: '{{.SLOWIO_STAT_US | default "10000"}}'
      BIND: '{{.BENCH_BIND | default "127.0.0.1:8787"}}'
    cmds:
      - >
        SLOWIO_STAT_US={{.STAT_US}}
        LD_PRELOAD={{.TASKFILE_DIR}}/bench/bin/slowio.so
        {{.TASKFILE_DIR}}/target/release/plocate-server
        --base-path bench/data/tree
        --bind {{.BIND}}
        --db-path bench/data/files.db
        {{.CLI_ARGS}}

  bench-build-slowio:
    desc: Compile the LD_PRELOAD stat-latency shim (slowio.so)
    sources:
      - bench/bin/slowio.c
    generates:
      - bench/bin/slowio.so
    cmds:
      - bash bench/bin/build-slowio.sh

  bench-baseline:
    desc: "Constant-RPS latency test (pass --rate N --duration D)"
    cmds:
      - cargo run --release -p bench -- --url http://127.0.0.1:8787 --queries bench/data/queries.txt {{.CLI_ARGS}}

  bench-saturate:
    desc: "Constant-concurrency saturation test (pass --concurrency N --duration D)"
    cmds:
      - cargo run --release -p bench -- --url http://127.0.0.1:8787 --queries bench/data/queries.txt {{.CLI_ARGS}}
